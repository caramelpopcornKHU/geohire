# Application
spring.application.name=geohire

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/geohire?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=3739
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

# JWT
jwt.secret=geohire-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-2026
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000
